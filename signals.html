<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAT Trade Signals</title>
    <style>
        :root {
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.82);
            --panel-soft: rgba(30, 41, 59, 0.62);
            --border: rgba(148, 163, 184, 0.2);
            --text: #f8fafc;
            --muted: #94a3b8;
            --blue: #1d8cff;
            --cyan: #22d3ee;
            --gold: #fbbf24;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background:
                radial-gradient(circle at 18% 12%, rgba(34, 211, 238, 0.16), transparent 28%),
                radial-gradient(circle at 82% 0%, rgba(37, 99, 235, 0.22), transparent 24%),
                linear-gradient(135deg, #020617 0%, #07111f 48%, #020617 100%);
            color: var(--text);
        }

        .signals-shell {
            width: min(980px, calc(100% - 32px));
            min-height: 100vh;
            margin: 0 auto;
            padding: 32px 0 48px;
            display: grid;
            align-content: center;
        }

        .signals-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 32px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text);
            text-decoration: none;
        }

        .brand-mark {
            font-size: 42px;
            line-height: 0.9;
            font-weight: 950;
            letter-spacing: -0.16em;
            font-style: italic;
            background: linear-gradient(135deg, var(--cyan), #0b7cff 60%, #1554ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 18px rgba(14, 165, 233, 0.42));
        }

        .brand-title {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.04em;
        }

        .brand-subtitle {
            margin-top: 2px;
            color: var(--muted);
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .back-link {
            min-height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 18px;
            border: 1px solid rgba(96, 165, 250, 0.34);
            border-radius: 12px;
            color: var(--text);
            background: rgba(15, 23, 42, 0.48);
            text-decoration: none;
            font-weight: 800;
        }

        .signals-card {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 30px;
            background:
                radial-gradient(circle at 88% 10%, rgba(251, 191, 36, 0.16), transparent 26%),
                linear-gradient(180deg, var(--panel), rgba(2, 6, 23, 0.9));
            box-shadow: 0 36px 90px rgba(0, 0, 0, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(18px);
            padding: clamp(30px, 6vw, 62px);
            text-align: center;
        }

        .premium-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            padding: 0 16px;
            border-radius: 999px;
            color: #fde68a;
            background: rgba(251, 191, 36, 0.14);
            border: 1px solid rgba(251, 191, 36, 0.34);
            font-size: 12px;
            font-weight: 950;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        h1 {
            margin: 22px 0 8px;
            font-size: clamp(46px, 9vw, 82px);
            line-height: 0.95;
            letter-spacing: -0.07em;
        }

        h2 {
            margin: 0;
            color: var(--blue);
            font-size: clamp(28px, 6vw, 52px);
            letter-spacing: -0.05em;
        }

        .signals-copy {
            max-width: 680px;
            margin: 24px auto 0;
            color: #cbd5e1;
            font-size: clamp(16px, 2.6vw, 19px);
            line-height: 1.7;
        }

        .notify-button {
            margin-top: 32px;
            min-height: 52px;
            padding: 0 30px;
            border: 1px solid rgba(59, 130, 246, 0.8);
            border-radius: 14px;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: var(--text);
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 18px 48px rgba(37, 99, 235, 0.35);
        }

        .notify-message {
            min-height: 24px;
            margin-top: 16px;
            color: #7dd3fc;
            font-weight: 700;
        }

        @media (max-width: 640px) {
            .signals-shell {
                width: min(100% - 20px, 980px);
                padding: 18px 0 28px;
            }

            .signals-nav {
                align-items: flex-start;
                margin-bottom: 18px;
            }

            .brand-mark {
                font-size: 36px;
            }

            .brand-title {
                font-size: 19px;
            }

            .back-link {
                min-height: 38px;
                padding: 0 12px;
                font-size: 13px;
            }

            .signals-card {
                border-radius: 24px;
                padding: 34px 20px;
            }
        }
    </style>
</head>
<body>
    <main class="signals-shell">
        <nav class="signals-nav" aria-label="Signals navigation">
            <a class="brand" href="chart.html">
                <span class="brand-mark">NT</span>
                <span>
                    <span class="brand-title">NAT Trade</span>
                    <span class="brand-subtitle">Paper Trading Platform</span>
                </span>
            </a>
            <a class="back-link" href="chart.html">Back to NAT Trade</a>
        </nav>

        <section class="signals-card">
            <span class="premium-badge">Premium</span>
            <h1>Signals</h1>
            <h2>Coming Soon</h2>
            <p class="signals-copy">
                Premium feature under development.
                Real-time trading signals, alerts, and advanced market insights will be available in a future update.
            </p>
            <button id="notifyButton" class="notify-button" type="button">Notify Me</button>
            <div id="notifyMessage" class="notify-message" aria-live="polite"></div>
        </section>
    </main>

    <script>
        document.getElementById("notifyButton")?.addEventListener("click", () => {
            const message = document.getElementById("notifyMessage");
            if (message) {
                message.textContent = "Thanks. Notifications will be available when Signals launches.";
            }
        });
    </script>
</body>
</html>
